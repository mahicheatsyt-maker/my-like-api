<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #333; }
        .actions { text-align: center; margin-bottom: 20px; }
        .actions a { margin: 0 10px; text-decoration: none; color: #007bff; font-weight: bold; }
        .actions a:hover { text-decoration: underline; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #f8f9fa; font-weight: bold; }
        tr:hover { background-color: #f5f5f5; }
    </style>
</head>
<body>
    <div class="container">
        <h1>API Keys Management</h1>
        <div class="actions">
            <a href="/admin/create_key">Create New Key</a> | <a href="/admin/logout">Logout</a>
        </div>
        <h2>Existing Keys</h2>
        {% if keys %}
        <table>
            <thead>
                <tr>
                    <th>Key Name</th>
                    <th>Daily Limit</th>
                    <th>Expires At</th>
                    <th>Usage Today</th>
                </tr>
            </thead>
            <tbody>
                {% for key in keys %}
                <tr>
                    <td>{{ key.key }}</td>
                    <td>{{ key.daily_limit }}</td>
                    <td>{{ key.expires_at }}</td>
                    <td>{{ key.usage_today }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        {% else %}
        <p>No keys created yet.</p>
        {% endif %}
    </div>
</body>
</html>
