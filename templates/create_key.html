<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create API Key</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 2rem; }
        
        .container { background: white; padding: 3rem; border-radius: 10px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); width: 100%; max-width: 500px; }
        h1 { text-align: center; color: #667eea; margin-bottom: 2rem; }
        
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; color: #333; font-weight: bold; }
        input, select { width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 5px; font-size: 1rem; transition: 0.3s; }
        input:focus, select:focus { outline: none; border-color: #667eea; box-shadow: 0 0 5px rgba(102, 126, 234, 0.3); }
        
        .btn { width: 100%; padding: 0.8rem; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 5px; font-size: 1rem; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3); }
        
        .link-container { text-align: center; margin-top: 1.5rem; }
        .link-container a { color: #667eea; text-decoration: none; }
        .link-container a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔑 Create New API Key</h1>
        <form method="post">
            <div class="form-group">
                <label for="key_name">Key Name</label>
                <input type="text" id="key_name" name="key_name" required placeholder="e.g., testkey123">
            </div>
            
            <div class="form-group">
                <label for="username">Assign to User</label>
                <select id="username" name="username" required>
                    <option value="">-- Select a User --</option>
                    {% for user in users %}
                    <option value="{{ user.username }}">{{ user.username }} ({{ user.email }})</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group">
                <label for="daily_limit">Daily Request Limit</label>
                <input type="number" id="daily_limit" name="daily_limit" required value="1000" min="1">
            </div>
            
            <div class="form-group">
                <label for="expiration_days">Expiration Days</label>
                <input type="number" id="expiration_days" name="expiration_days" required value="30" min="1">
            </div>
            
            <button type="submit" class="btn">Create Key</button>
        </form>
        
        <div class="link-container">
            <a href="/admin/dashboard">Back to Dashboard</a>
        </div>
    </div>
</body>
</html>
